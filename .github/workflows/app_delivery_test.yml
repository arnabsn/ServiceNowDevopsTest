name: App Delivery Pipeline

on: workflow_dispatch

jobs:
  # ── Stage 1 (Build) ──
  alpha:
    name: 'Alpha'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up JDK 11
        uses: actions/setup-java@v3
        with:
          java-version: '11'
          distribution: 'temurin'
          cache: maven
      - name: prep
        run: mvn clean compile
      - name: bundle it up
        run: mvn -B package -DskipTests

  # ── Stage 2 (Test) ──
  bravo:
    name: 'Bravo'
    needs: alpha
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-java@v3
        with:
          java-version: '11'
          distribution: 'temurin'
      - name: run the routine
        run: mvn test

  # ── Stage 3 (Sonar + register artifact/package) ──
  charlie:
    name: 'Charlie'
    needs: bravo
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
      - name: deep look
        uses: SonarSource/sonarqube-scan-action@v2
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_URL }}
        with:
          args: >
            -Dsonar.projectKey=${{ secrets.SONAR_PROJECT_KEY }}

  # ── Stage 4 (Change) ──
  delta:
    name: 'Delta'
    if: always()
    needs: charlie
    runs-on: ubuntu-latest
    steps:
      - name: checkpoint
        uses: ServiceNow/servicenow-devops-change@v4.1.0
        with:
          devops-integration-token: ${{ secrets.SN_DEVOPS_TOKEN }}
          instance-url: ${{ secrets.SN_INSTANCE_URL }}
          tool-id: ${{ secrets.SN_ORCHESTRATION_TOOL_ID }}
          context-github: ${{ toJSON(github) }}
          job-name: 'Delta'
          change-request: '{"autoCloseChange":true,"attributes":{"chg_model":{"name":"DevOps"},"short_description":"Automated Software Deployments","description":"Automated Software Deployment.","assignment_group":"a715cd759f2002002920bde8132e7018","implementation_plan":"Software update is tested and results can be found in Test Summaries Tab.","backout_plan":"When software fails in production, the previous software release will be re-deployed.","test_plan":"Testing if the software was successfully deployed."}}'
          interval: '100'
          timeout: '3600'

  # ── Stage 5 (Deploy) ──
  echo:
    name: 'Echo'
    needs: delta
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v3
        with:
          name: app-jar
      - name: send it out
        run: |
          echo "Rolling out app-jar 1.${{ github.run_number }} to production"
